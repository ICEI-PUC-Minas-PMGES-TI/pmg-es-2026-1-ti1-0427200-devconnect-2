<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Faça a Diferença</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Criar Nova Conta</h2>

    <div class="wrapper-tabs">
        <input type="radio" name="tabs" id="tab-vaquinha" class="radio-tab" checked>
        <label for="tab-vaquinha" class="label-tab">Criar Vaquinha</label>
        
        <div class="content-tab content-vaquinha">
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="nome-criador">Nome do Responsável</label>
                    <input type="text" id="nome-criador" placeholder="Seu nome completo" required>
                </div>

                <div class="form-group">
                    <label for="email-vaquinha">E-mail de contato</label>
                    <input type="email" id="email-vaquinha" placeholder="exemplo@email.com" required>
                </div>

                <div class="form-group">
                    <label for="titulo-vaquinha">Título da Vaquinha</label>
                    <input type="text" id="titulo-vaquinha" placeholder="Ex: Ajuda para o tratamento do Totó" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="meta-valor">Meta (R$)</label>
                        <input type="number" id="meta-valor" placeholder="0,00" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="categoria-vaquinha">Categoria</label>
                        <select id="categoria-vaquinha" required>
                            <option value="">Selecione...</option>
                            <option value="saude">Saúde / Médica</option>
                            <option value="causa-animal">Causa Animal</option>
                            <option value="educacao">Educação</option>
                            <option value="ambiente">Meio Ambiente</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="descricao-vaquinha">História / Objetivo</label>
                    <textarea id="descricao-vaquinha" placeholder="Conte um pouco sobre a sua história e por que precisa da ajuda..." required></textarea>
                </div>

                <button type="submit">Lançar Vaquinha</button>
            </form>
        </div>

        <input type="radio" name="tabs" id="tab-ong" class="radio-tab">
        <label for="tab-ong" class="label-tab">Cadastrar ONG</label>
        
        <div class="content-tab content-ong">
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="nome-ong">Nome da Organização</label>
                    <input type="text" id="nome-ong" placeholder="Nome oficial da ONG" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cnpj-ong">CNPJ</label>
                        <input type="text" id="cnpj-ong" placeholder="00.000.000/0001-00" required>
                    </div>
                    <div class="form-group">
                        <label for="telefone-ong">Telefone</label>
                        <input type="tel" id="telefone-ong" placeholder="(00) 00000-0000" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email-ong">E-mail Institucional</label>
                    <input type="email" id="email-ong" placeholder="contato@ong.org" required>
                </div>

                <div class="form-group">
                    <label for="site-ong">Website ou Rede Social (Opcional)</label>
                    <input type="url" id="site-ong" placeholder="https://www.suaong.org">
                </div>

                <div class="form-group">
                    <label for="causa-ong">Foco de Atuação</label>
                    <select id="causa-ong" required>
                        <option value="">Selecione a principal causa...</option>
                        <option value="criancas">Crianças e Adolescentes</option>
                        <option value="animais">Proteção Animal</option>
                        <option value="fome">Combate à Fome</option>
                        <option value="cultura">Cultura e Arte</option>
                    </select>
                </div>

                <button type="submit">Cadastrar Instituição</button>
            </form>
        </div>
    </div>

    <p class="footer-text">Seus dados estão protegidos de acordo com a LGPD.</p>
</div>
<script src="cadastro.js"></script>
</body>
</html>
