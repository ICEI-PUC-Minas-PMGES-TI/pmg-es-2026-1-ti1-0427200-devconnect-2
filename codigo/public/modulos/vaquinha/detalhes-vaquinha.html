<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalhes da Vaquinha — ConectaPlus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="detalhes-vaquinha.css"/>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <a href="../home-page/home_page.html" class="btn-voltar">&#8592;</a>
    <div class="header-texto">
      <span class="app-nome">ConectaPlus</span>
      <span class="header-titulo">Detalhes da vaquinha</span>
    </div>
  </header>

  <!-- CONTEUDO -->
  <main class="container">
    <div class="card-detalhe">

      <div id="imagemVaquinha" class="imagem-placeholder">🤝</div>

      <div class="conteudo">
        <div class="topo">
          <span id="categoria" class="badge-categoria"></span>
          <span id="dataLimiteTopo" class="data-limite"></span>
        </div>

        <h1 id="titulo" class="titulo"></h1>
        <p id="descricao" class="descricao"></p>

        <div class="meta-wrapper">
          <div class="meta-label">
            <span>Arrecadado</span>
            <strong id="arrecadado"></strong>
          </div>
          <div class="barra-fundo">
            <div id="barraProgresso" class="barra-fill"></div>
          </div>
          <div class="meta-rodape">
            <span id="porcentagem"></span>
            <span id="metaTexto"></span>
          </div>
        </div>

        <hr>

        <p class="info-linha"><strong>Tipo de doação:</strong> <span id="tipoDoacao"></span></p>
        <p class="info-linha"><strong>Data de criação:</strong> <span id="dataCriacao"></span></p>
        <p class="info-linha" id="linhaDataLimite"><strong>Data limite:</strong> <span id="dataLimite"></span></p>
        <p class="info-linha" id="linhaEmergencial"><strong>Emergencial:</strong> Sim</p>

        <div id="blocoInformacoes" class="bloco-informacoes">
          <h3>Informações adicionais</h3>
          <p id="informacoes"></p>
        </div>

        <a id="linkOng" href="#" class="link-ong">Ver ONG responsável →</a>

      </div>
    </div>
  </main>

  <script src="detalhes-vaquinha.js"></script>
</body>
</html>
