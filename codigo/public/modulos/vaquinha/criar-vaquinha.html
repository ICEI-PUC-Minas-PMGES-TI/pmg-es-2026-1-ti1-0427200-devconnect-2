<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Nova Vaquinha</title>
    <link rel="stylesheet" href="criar-vaquinha.css">
</head>
<body>

    <header class="header">
        <a href="../home-page/home_page.html" class="btn-voltar">←</a>
        <div class="header-texto">
            <span class="app-nome">Vaquinhas</span>
            <span class="header-titulo">Criar Campanha</span>
        </div>
    </header>

    <div class="container">
        <div class="abas-cadastro" style="display: flex; gap: 16px; margin-bottom: 24px; border-bottom: 2px solid var(--cinza-borda); padding-bottom: 8px;">
            <button type="button" class="filtro-aba ativo" id="aba-vaquinha" style="background: none; border: none; font-size: 1.1rem; font-weight: 700; color: var(--verde-medio); cursor: pointer; padding: 4px 12px; border-bottom: 3px solid var(--verde-medio); margin-bottom: -11px; transition: all var(--t);">Nova Vaquinha</button>
            <button type="button" class="filtro-aba" id="aba-ong" style="background: none; border: none; font-size: 1.1rem; font-weight: 600; color: var(--cinza-texto); cursor: pointer; padding: 4px 12px; border-bottom: 3px solid transparent; margin-bottom: -11px; transition: all var(--t);">Nova ONG</button>
        </div>

        <form id="form-vaquinha">
            <div class="campo">
                <label id="label-titulo" for="titulo">Título da Vaquinha *</label>
                <input type="text" id="titulo" placeholder="Ex: Ajuda para cirurgia do Totó">
                <span id="erro-titulo" class="erro"></span>
            </div>

            <div class="campo oculto" id="bloco-razao">
                <label for="razao-social">Razão Social / Nome da Instituição *</label>
                <input type="text" id="razao-social" placeholder="Ex: Associação de Apoio aos Animais de BH">
                <span id="erro-razao" class="erro"></span>
            </div>

            <div class="campo oculto" id="bloco-cnpj">
                <label for="cnpj">CNPJ *</label>
                <input type="text" id="cnpj" placeholder="Ex: 00.000.000/0001-00" maxlength="18">
                <span id="erro-cnpj" class="erro"></span>
            </div>

            <div class="campo">
                <label for="descricao">Descrição Curta *</label>
                <textarea id="descricao" rows="2" placeholder="Resuma o motivo da sua campanha..."></textarea>
                <span id="erro-descricao" class="erro"></span>
            </div>

            <div class="campo">
                <label for="categoria">Categoria *</label>
                <select id="categoria">
                    <option value="">Selecione...</option>
                    <option value="Saúde">Saúde</option>
                    <option value="Educação">Educação</option>
                    <option value="Causa Animal">Causa Animal</option>
                    <option value="Meio Ambiente">Meio Ambiente</option>
                </select>
                <span id="erro-categoria" class="erro"></span>
            </div>

            <div class="campo">
                <label for="tipo">Tipo de Doação *</label>
                <select id="tipo">
                    <option value="">Selecione...</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Suprimentos">Suprimentos</option>
                </select>
                <span id="erro-tipo" class="erro"></span>
            </div>

            <div class="campo">
                <label for="meta">Meta de Arrecadação (R$) *</label>
                <input type="number" id="meta" placeholder="Ex: 5000">
                <span id="erro-meta" class="erro"></span>
            </div>

            <div class="campo oculto" id="bloco-site">
                <label for="site">Website ou Rede Social da ONG (Opcional)</label>
                <input type="url" id="site" placeholder="Ex: https://www.instagram.com/suaong">
            </div>

            <div class="campo">
                <label for="informacoes">Informações Detalhadas (Opcional)</label>
                <textarea id="informacoes" rows="4" placeholder="Conte a história completa aqui..."></textarea>
            </div>

            <div class="campo">
                <label>Imagem da Campanha</label>
                <label for="imagem" class="upload-imagem">
                    <div id="placeholder-upload">
                        <span class="icone-camera">📷</span>
                        <span>Clique para selecionar uma imagem</span>
                    </div>
                    <img id="preview" alt="Preview da imagem">
                </label>
                <input type="file" id="imagem" accept="image/*" style="display: none;">
            </div>

            <button type="submit" class="btn-criar" id="btn-submit">Salvar e Visualizar</button>
        </form>

        <div id="mensagem-sucesso" class="mensagem-sucesso oculto">
            <div class="icone-sucesso">✓</div>
            <h2>Campanha Criada!</h2>
            <p>Sua vaquinha foi salva com sucesso no sistema.</p>
        </div>
    </div>

    <script src="criar-vaquinha.js"></script>

    <a href="../home-page/home_page.html" id="btnHome" title="Voltar para a Home">🏠</a>
    <button id="btnTopo" title="Voltar ao topo">↑</button>
</body>
</html>
