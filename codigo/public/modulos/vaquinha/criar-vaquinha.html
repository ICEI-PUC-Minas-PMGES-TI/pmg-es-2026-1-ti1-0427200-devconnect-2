<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Nova Vaquinha</title>
    <link rel="stylesheet" href="criar-vaquinha.css">
</head>
<body>

    <header class="header">
        <a href="../index.html" class="btn-voltar">←</a>
        <div class="header-texto">
            <span class="app-nome">Vaquinhas</span>
            <span class="header-titulo">Criar Campanha</span>
        </div>
    </header>

    <div class="container">
        <form id="form-vaquinha">
            <div class="campo">
                <label for="titulo">Título da Vaquinha *</label>
                <input type="text" id="titulo" placeholder="Ex: Ajuda para cirurgia do Totó">
                <span id="erro-titulo" class="erro"></span>
            </div>

            <div class="campo">
                <label for="descricao">Descrição Curta *</label>
                <textarea id="descricao" rows="2" placeholder="Resuma o motivo da sua campanha..."></textarea>
                <span id="erro-descricao" class="erro"></span>
            </div>

            <div class="campo">
                <label for="categoria">Categoria *</label>
                <select id="categoria">
                    <option value="">Selecione...</option>
                    <option value="Saúde">Saúde</option>
                    <option value="Educação">Educação</option>
                    <option value="Causa Animal">Causa Animal</option>
                    <option value="Meio Ambiente">Meio Ambiente</option>
                </select>
                <span id="erro-categoria" class="erro"></span>
            </div>

            <div class="campo">
                <label for="tipo">Tipo de Doação *</label>
                <select id="tipo">
                    <option value="">Selecione...</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Suprimentos">Suprimentos</option>
                </select>
                <span id="erro-tipo" class="erro"></span>
            </div>

            <div class="campo">
                <label for="meta">Meta de Arrecadação (R$) *</label>
                <input type="number" id="meta" placeholder="Ex: 5000">
                <span id="erro-meta" class="erro"></span>
            </div>

            <div class="campo">
                <label for="informacoes">Informações Detalhadas (Opcional)</label>
                <textarea id="informacoes" rows="4" placeholder="Conte a história completa aqui..."></textarea>
            </div>

            <div class="campo">
                <label>Imagem da Campanha</label>
                <label for="imagem" class="upload-imagem">
                    <div id="placeholder-upload">
                        <span class="icone-camera">📷</span>
                        <span>Clique para selecionar uma imagem</span>
                    </div>
                    <img id="preview" alt="Preview da imagem">
                </label>
                <input type="file" id="imagem" accept="image/*" style="display: none;">
            </div>

            <button type="submit" class="btn-criar">Salvar e Visualizar</button>
        </form>

        <div id="mensagem-sucesso" class="mensagem-sucesso oculto">
            <div class="icone-sucesso">✓</div>
            <h2>Campanha Criada!</h2>
            <p>Sua vaquinha foi salva com sucesso no sistema.</p>
        </div>
    </div>

    <script src="criar-vaquinha.js"></script>
</body>
</html>
