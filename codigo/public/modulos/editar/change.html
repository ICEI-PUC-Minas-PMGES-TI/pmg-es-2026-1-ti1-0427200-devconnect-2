<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ConectaPlus — Editar Vaquinha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="home_page.css"/>
  <link rel="stylesheet" href="editar_vaquinha.css"/>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="#" class="logo">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="rgba(255,255,255,0.15)"/>
          <path d="M16 24s-9-5.5-9-11a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 5.5-9 11-9 11z" fill="#F5A623"/>
        </svg>
        <span class="logo-nome">ConectaPlus</span>
      </a>
      <nav class="nav">
        <a href="#" class="nav-link">Campanhas</a>
        <a href="#" class="nav-link">ONGs</a>
        <a href="#" class="nav-link nav-perfil">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          Perfil
        </a>
      </nav>
    </div>
  </header>

  <div id="toast-container"></div>

  <div class="pagina-editar">
    
    <a href="#" class="btn-voltar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Voltar ao painel
    </a>

    <main class="card-editar">
      <div class="form-cabecalho">
        <h1 class="form-titulo">Modificar Detalhes da Campanha</h1>
        <p class="form-subtitulo">Ajuste os dados necessários abaixo. Transparência na descrição ajuda a engajar mais doadores.</p>
      </div>

      <form id="form-edicao-vaquinha">
        
        <div class="form-grupo">
          <label class="form-label" for="vaquinha-id">ID da Vaquinha</label>
          <input type="text" id="vaquinha-id" class="input-edicao input-readonly" value="#CP-84920" readonly />
          <p class="form-ajuda">Este identificador é exclusivo do sistema e não pode ser modificado.</p>
        </div>

        <div class="form-grupo">
          <label class="form-label" for="vaquinha-titulo">Título da Campanha</label>
          <input type="text" id="vaquinha-titulo" class="input-edicao" required placeholder="Ex: Ajuda para reconstrução do abrigo" value="Arrecadação para rações da ONG Patas Felizes">
        </div>

        <div class="form-row-duplo">
          <div class="form-grupo">
            <label class="form-label" for="vaquinha-categoria">Causa Principal</label>
            <select id="vaquinha-categoria" class="select-edicao" required>
              <option value="Saúde">Saúde</option>
              <option value="Educação">Educação</option>
              <option value="Vestimentas">Vestimentas</option>
              <option value="Alimento">Alimento</option>
              <option value="Ajuda aos animais" selected>Ajuda aos animais</option>
            </select>
          </div>

          <div class="form-grupo">
            <label class="form-label" for="vaquinha-meta">Meta Financeira (R$)</label>
            <input type="number" id="vaquinha-meta" class="input-edicao" step="0.01" min="10" required placeholder="0.00" value="5000.00">
          </div>
        </div>

        <div class="form-grupo">
          <label class="form-label" for="vaquinha-descricao">História / Descrição Detalhada</label>
          <textarea id="vaquinha-descricao" class="textarea-edicao" rows="5" required placeholder="Conte os motivos da sua campanha e onde os recursos serão aplicados...">Precisamos arrecadar fundos com urgência para garantir a compra de ração e insumos médicos para os 45 animais resgatados no último mês...</textarea>
        </div>

        <div class="form-grupo">
          <label class="form-label">Imagem de Capa</label>
          <div class="upload-imagem-box" id="upload-box">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--cinza-texto)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>
            <p style="font-size: 0.8rem; font-weight: 600; margin-top: 6px; color: var(--cinza-texto);">Clique para alterar a foto do card</p>
            <input type="file" id="vaquinha-foto" accept="image/*" style="display: none;">
          </div>
          
          <div class="preview-container">
            <img id="imagem-preview" class="img-preview" src="https://images.unsplash.com/photo-1548767797-d8c844163c4c?w=400&auto=format&fit=crop&q=60" alt="Preview da campanha">
          </div>
        </div>

        <div class="form-botoes">
          <button type="button" class="btn-cancelar" id="btn-descartar">Descart
