<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Doações</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-md-3 sidebar">

    <div class="text-center">

        <div class="profile-img" id="fotoUsuario"></div>

        <h6 class="mt-3 mb-0" id="nomeUsuario">
            Usuário
        </h6>

        <small class="text-success" id="cargoUsuario">
            Cargo
        </small>

    </div>

    <div class="mt-5">

        <div class="menu-item">
            Meu perfil
        </div>

        <div class="menu-item ativo">
            Histórico de doações
        </div>

        <div class="menu-item">
            Meus eventos
        </div>

        <div class="menu-item">
            Notificações
        </div>

        <div class="menu-item">
            Sair
        </div>

    </div>

</div>

<div class="col-md-9 p-4">

    <h2 id="tituloPagina">
        Histórico de doações
    </h2>

    <p class="text-secondary" id="descricaoPagina">
        Acompanhe suas doações realizadas
    </p>

    <div class="row g-3 mb-4">

        <div class="col-md-4">

            <div class="card card-info p-3">

                <div class="d-flex align-items-center gap-3">

                    <div class="icone"></div>

                    <div>

                        <small>Total doado</small>

                        <h5 id="totalDoado">
                            R$0,00
                        </h5>

                    </div>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card card-info p-3">

                <div class="d-flex align-items-center gap-3">

                    <div class="icone"></div>

                    <div>

                        <small>Última doação</small>

                        <h5 id="ultimaDoacao">
                            00/00/0000
                        </h5>

                    </div>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card card-info p-3">

                <div class="d-flex align-items-center gap-3">

                    <div class="icone"></div>

                    <div>

                        <small>Projetos apoiados</small>

                        <h5 id="projetosApoiados">
                            0
                        </h5>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="card historico-card p-4">

        <table class="table align-middle">

            <thead>

                <tr>

                    <th>Data</th>
                    <th>Projeto</th>
                    <th>Valor</th>
                    <th>Pagamento</th>
                    <th>Status</th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td id="dataDoacao">
                        00/00/0000
                    </td>

                    <td id="nomeProjeto">
                        Campanha do Agasalho
                    </td>

                    <td id="valorDoacao">
                        R$0,00
                    </td>

                    <td id="formaPagamento">
                        PIX
                    </td>

                    <td>

                        <span class="badge bg-success" id="statusDoacao">

                            Concluída

                        </span>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

</div>

</div>

</body>

</html>
