<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Emergencia</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="cadastro-emergencias.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg shadow-sm minha-navbar">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold fs-2 text-white" href="#">DevConnect</a>
        </div>
    </nav>

    <!-- FORMULARIO -->
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="card p-4 shadow-sm">
                    <h2 class="mb-1">Cadastrar Emergencia</h2>
                    <p class="text-muted mb-4">Preencha os campos abaixo</p>

                    <form id="formEmergencia">

                        <div class="mb-3">
                            <label for="titulo" class="form-label">Titulo</label>
                            <input type="text" class="form-control" id="titulo" placeholder="Titulo da emergencia" maxlength="60">
                        </div>

                        <div class="mb-3">
                            <label for="descricao" class="form-label">Descricao</label>
                            <textarea class="form-control" id="descricao" placeholder="Descreva a emergencia" maxlength="300"></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="categoria" class="form-label">Categoria</label>
                            <select class="form-control" id="categoria">
                                <option value="">Selecione</option>
                                <option value="Moradia">Moradia</option>
                                <option value="Alimentacao">Alimentacao</option>
                                <option value="Saude">Saude</option>
                                <option value="Educacao">Educacao</option>
                                <option value="Outro">Outro</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="tipoDoacao" class="form-label">Tipo de doacao</label>
                            <select class="form-control" id="tipoDoacao">
                                <option value="">Selecione</option>
                                <option value="dinheiro">Dinheiro</option>
                                <option value="itens">Itens</option>
                                <option value="ambos">Dinheiro e Itens</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="meta" class="form-label">Meta (R$)</label>
                            <input type="number" class="form-control" id="meta" placeholder="Ex: 5000" min="1">
                        </div>

                        <div class="mb-3">
                            <label for="urgencia" class="form-label">Urgencia</label>
                            <select class="form-control" id="urgencia">
                                <option value="">Selecione</option>
                                <option value="alta">Alta</option>
                                <option value="media">Media</option>
                                <option value="baixa">Baixa</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="dataLimite" class="form-label">Data limite</label>
                            <input type="date" class="form-control" id="dataLimite">
                        </div>

                        <button type="submit" class="btn w-100 mt-2">Cadastrar</button>

                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="cadastro-emergencias.js"></script>

</body>
</html>
