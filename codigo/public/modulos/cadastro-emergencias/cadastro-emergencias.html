<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Emergencia</title>
    <link rel="stylesheet" href="cadastro-emergencias.css">
</head>
<body>

<!--Cabecalho-->
<header>
    <nav>
        <a href="#">DevConnect</a>
    </nav>
</header>

<main>
    <h1>Cadastro de Emergencia</h1>

    <form id="formEmergencia">

        <label>Titulo</label><br>
        <input type="text" id="titulo"><br><br>

        <label>Descricao</label><br>
        <textarea id="descricao"></textarea><br><br>

        <label>Categoria</label><br>
        <select id="categoria">
            <option value="">Selecione</option>
            <option value="Moradia">Moradia</option>
            <option value="Saude">Saude</option>
        </select><br><br>

        <!-- adicionar mais campos -->

        <button type="submit">Cadastrar</button>

    </form>
</main>

<script src="cadastro-emergencias.js"></script>

</body>
</html>
