<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da ONG</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="detalhes-ong.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg shadow-sm minha-navbar">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold fs-2 text-white" href="#">DevConnect</a>
        </div>
    </nav>

    <!-- CONTEUDO -->
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-7">

                <div class="card shadow-sm p-4">

                    <div class="mb-3">
                        <h2 id="nomeOng">Carregando...</h2>
                        <span id="verificada"></span>
                    </div>

                    <div class="mb-3">
                        <p><strong>Categoria:</strong> <span id="categoria"></span></p>
                    </div>

                    <div class="mb-3">
                        <p><strong>Descricao:</strong></p>
                        <p id="descricao" class="text-muted"></p>
                    </div>

                    <div class="mb-3">
                        <p><strong>Missao:</strong></p>
                        <p id="missao" class="text-muted"></p>
                    </div>

                    <hr>

                    <h5 class="mb-3">Contato</h5>

                    <div class="mb-2">
                        <p><strong>Email:</strong> <span id="email"></span></p>
                    </div>

                    <div class="mb-2">
                        <p><strong>Telefone:</strong> <span id="telefone"></span></p>
                    </div>

                    <div class="mb-2">
                        <p><strong>Endereco:</strong> <span id="endereco"></span></p>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="detalhes-ong.js"></script>

</body>
</html>
