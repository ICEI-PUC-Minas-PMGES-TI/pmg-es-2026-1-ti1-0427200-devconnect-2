<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da ONG</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="detalhes-ong.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg shadow-sm minha-navbar">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold fs-2 text-white" href="#">DevConnect</a>
        </div>
    </nav>

    <!-- CONTEUDO -->
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-7">

                <!-- Card da ONG -->
                <div class="card shadow-sm mb-4">

                    <div class="card-header-ong p-4">
                        <h2 id="nomeOng" class="text-white mb-1">Carregando...</h2>
                        <span id="verificada" class="badge-verificada"></span>
                    </div>

                    <div class="p-4">

                        <div class="mb-4">
                            <span id="categoria" class="badge-categoria"></span>
                        </div>

                        <div class="mb-4">
                            <h6 class="label-titulo">Sobre a ONG</h6>
                            <p id="descricao" class="text-muted"></p>
                        </div>

                        <div class="mb-4">
                            <h6 class="label-titulo">Missao</h6>
                            <p id="missao" class="text-muted"></p>
                        </div>

                        <hr>

                        <h6 class="label-titulo mb-3">Informacoes de Contato</h6>

                        <p class="mb-1"><strong>Email:</strong> <span id="email"></span></p>
                        <p class="mb-1"><strong>Telefone:</strong> <span id="telefone"></span></p>
                        <p class="mb-4"><strong>Endereco:</strong> <span id="endereco"></span></p>

                        <hr>

                        <p class="text-muted small">Cadastrada em: <span id="dataCadastro"></span></p>

                    </div>
                </div>

                <!-- Emergencias da ONG -->
                <h5 class="mb-3 titulo-emergencias">Emergencias Cadastradas</h5>

                <div id="listaEmergencias">
                    <p class="text-muted">Carregando emergencias...</p>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="detalhes-ong.js"></script>

</body>
</html>
