<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Projeto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F7F8FA; font-family: 'Plus Jakarta Sans', sans-serif; }
        .edit-container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
        .btn-salvar { background-color: #2D7A45; color: white; width: 100%; font-weight: 700; }
        .btn-salvar:hover { background-color: #1e5222; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="edit-container">
        <h3 class="mb-4">Editar Projeto</h3>
        <form id="formEditar">
            <div class="mb-3">
                <label class="form-label">Título do Projeto</label>
                <input type="text" class="form-control" id="editTitulo" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Meta (R$)</label>
                <input type="number" class="form-control" id="editMeta" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Status</label>
                <select class="form-select" id="editStatus">
                    <option value="Ativa">Ativa</option>
                    <option value="Pendente">Pendente</option>
                    <option value="Concluída">Concluída</option>
                </select>
            </div>
            <button type="submit" class="btn btn-salvar">Salvar Alterações</button>
            <a href="../perfil/index.html" class="btn btn-link mt-2 w-100 text-secondary">Voltar</a>
        </form>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
